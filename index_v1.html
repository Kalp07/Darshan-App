<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="દર્શન" />
  <title>દર્શન</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg:        #0d0a06;
      --card-bg:   #1e1508;
      --gold:      #c8922a;
      --gold-lite: #e8b84b;
      --gold-dim:  #7a5618;
      --saffron:   #d4621a;
      --cream:     #f5e6c8;
      --cream-dim: #a89070;
      --live:      #2ecc71;
      --radius:    20px;
      --font:      'Noto Sans Gujarati', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ─── SCREENS ─── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.97);
    }

    /* ════════════════════════════
       HOME
    ════════════════════════════ */
    #home {
      background: var(--bg);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* ambient glow */
    #home::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 260px;
      background: radial-gradient(ellipse 70% 100% at 50% 0%, rgba(200,146,42,0.09) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .home-inner { position: relative; z-index: 1; }

    /* header */
    .home-header {
      padding: 56px 24px 18px;
      text-align: center;
    }
    .om {
      font-size: 2.8rem;
      color: var(--gold);
      line-height: 1;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(200,146,42,0.55);
    }
    .title {
      font-size: 2.3rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.03em;
    }
    .subtitle {
      font-size: 0.9rem;
      color: var(--cream-dim);
      margin-top: 5px;
      letter-spacing: 0.04em;
    }
    .divider {
      width: 52px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 18px auto 12px;
    }

    /* status */
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding-bottom: 18px;
      font-size: 0.78rem;
      color: var(--cream-dim);
    }
    .sdot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
      transition: background 0.4s;
    }
    .sdot.checking { background: var(--gold); animation: blink 1.1s infinite; }
    .sdot.done     { background: var(--live); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 0 18px 48px;
    }

    /* card */
    .card {
      position: relative;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--card-bg);
      border: 1.5px solid var(--gold-dim);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
      aspect-ratio: 3/4;
      display: flex;
      flex-direction: column;
      user-select: none;
    }
    .card:active {
      transform: scale(0.95);
      border-color: var(--gold);
      box-shadow: 0 0 28px rgba(200,146,42,0.4);
    }

    .card-img {
      width: 100%;
      flex: 1;
      min-height: 0;
      object-fit: cover;
      object-position: center top;
      display: block;
      filter: brightness(0.78) saturate(1.15);
    }
    .card-fallback {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      background: linear-gradient(150deg, #2a1a06, #110b03);
    }

    .card-info {
      flex-shrink: 0;
      padding: 11px 12px 13px;
      background: linear-gradient(0deg, rgba(8,5,0,0.98) 55%, rgba(8,5,0,0.5) 100%);
    }
    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.3;
      margin-bottom: 5px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .badge.live    { background: rgba(46,204,113,.15); color: var(--live);   border: 1px solid rgba(46,204,113,.4); }
    .badge.offline { background: rgba(90,90,90,.15);   color: #777;          border: 1px solid rgba(90,90,90,.3);  }
    .badge.loading { background: rgba(200,146,42,.12); color: var(--gold);   border: 1px solid rgba(200,146,42,.3);}
    .bdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .badge.live .bdot { animation: blink 1.2s infinite; }

    /* ════════════════════════════
       PLAYER
    ════════════════════════════ */
    #player { background: #000; }

    .p-frame {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* invisible tap catcher */
    .tap-catch {
      position: absolute;
      inset: 0;
      z-index: 10;
      background: transparent;
      cursor: default;
      -webkit-tap-highlight-color: transparent;
    }

    /* back button */
    .back {
      position: absolute;
      top: max(18px, env(safe-area-inset-top, 18px));
      left: 18px;
      z-index: 20;
      width: 54px; height: 54px;
      border-radius: 50%;
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1.5px solid rgba(200,146,42,0.45);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .back.show { opacity: 1; pointer-events: auto; }
    .back:active { transform: scale(0.88); }
    .back svg {
      width: 22px; height: 22px;
      stroke: var(--gold-lite);
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* corner ornaments */
    .orn {
      position: absolute;
      width: 26px; height: 26px;
      pointer-events: none;
      z-index: 5;
      opacity: 0.3;
    }
    .orn svg { width: 100%; height: 100%; }
    .orn-tl { top: 0; left: 0; }
    .orn-tr { top: 0; right: 0; transform: scaleX(-1); }
    .orn-bl { bottom: 0; left: 0; transform: scaleY(-1); }
    .orn-br { bottom: 0; right: 0; transform: scale(-1); }
  </style>
</head>
<body>

<!-- HOME -->
<div class="screen" id="home">
  <div class="home-inner">
    <div class="home-header">
      <div class="om">ॐ</div>
      <div class="title">દર્શન</div>
      <div class="subtitle">લાઈવ મંદિર દર્શન</div>
    </div>
    <div class="divider"></div>
    <div class="status">
      <div class="sdot" id="sdot"></div>
      <span id="stext">સ્થિતિ તપાસવામાં આવી રહી છે...</span>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- PLAYER -->
<div class="screen hidden" id="player">

  <!-- corner ornaments -->
  <div class="orn orn-tl"><svg viewBox="0 0 26 26"><path d="M2 24V2h22" stroke="#c8922a" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="2" cy="2" r="2" fill="#c8922a"/></svg></div>
  <div class="orn orn-tr"><svg viewBox="0 0 26 26"><path d="M2 24V2h22" stroke="#c8922a" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="2" cy="2" r="2" fill="#c8922a"/></svg></div>
  <div class="orn orn-bl"><svg viewBox="0 0 26 26"><path d="M2 24V2h22" stroke="#c8922a" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="2" cy="2" r="2" fill="#c8922a"/></svg></div>
  <div class="orn orn-br"><svg viewBox="0 0 26 26"><path d="M2 24V2h22" stroke="#c8922a" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="2" cy="2" r="2" fill="#c8922a"/></svg></div>

  <iframe class="p-frame" id="frame"
    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
    allowfullscreen
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>

  <!-- invisible overlay that catches taps -->
  <div class="tap-catch" id="catch"></div>

  <!-- back chevron -->
  <button class="back" id="back" aria-label="પાછા">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

</div>

<script>
// ══════════════════════════════════════════
// CONFIG — replace with your actual key
// ══════════════════════════════════════════
const API_KEY = 'AIzaSyAbS9-AVTAGaMc5YqawUAbpXxzTLsRGYLY';

// ══════════════════════════════════════════
// TEMPLES
// ══════════════════════════════════════════
const TEMPLES = [
  {
    id:        'somnath',
    name:      'સોમનાથ',
    channelId: 'UCT1egsvA08YcdMLiEu1DTRg',
    emoji:     '🔱',
    img:       'https://upload.wikimedia.org/wikipedia/commons/thumb/4/40/Somnath_temple%2C_Saurashtra%2C_Gujarat%2C_India.jpg/480px-Somnath_temple%2C_Saurashtra%2C_Gujarat%2C_India.jpg',
  },
  {
    id:        'mahakal',
    name:      'મહાકાળેશ્વર',
    channelId: 'UCW6GqPknjYIgrgPBx1L9yKQ',
    emoji:     '🕉️',
    img:       'https://upload.wikimedia.org/wikipedia/commons/thumb/f/f6/Mahakal_Temple_Ujjain.JPG/360px-Mahakal_Temple_Ujjain.JPG',
  },
  {
    id:        'dwarka',
    name:      'દ્વારકાધીશ',
    channelId: 'UCBAvMHZO3BIfMMhOK9LMOYQ',
    emoji:     '🪷',
    img:       'https://upload.wikimedia.org/wikipedia/commons/thumb/6/64/Dwaraka_Temple_Front.jpg/480px-Dwaraka_Temple_Front.jpg',
  },
  {
    id:        'vaishno',
    name:      'વૈષ્ણો દેવી',
    channelId: 'UCziZy6xAlJWPzgIY4duxAeQ',
    emoji:     '🌸',
    img:       'https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Vaishno_Devi_Temple.jpg/480px-Vaishno_Devi_Temple.jpg',
  },
];

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const STATUS = {};   // channelId → { live: bool, videoId: str|null }
let backTimer = null;

// ══════════════════════════════════════════
// DOM
// ══════════════════════════════════════════
const homeEl  = document.getElementById('home');
const playerEl= document.getElementById('player');
const gridEl  = document.getElementById('grid');
const frameEl = document.getElementById('frame');
const backEl  = document.getElementById('back');
const catchEl = document.getElementById('catch');
const sdot    = document.getElementById('sdot');
const stext   = document.getElementById('stext');

// ══════════════════════════════════════════
// BUILD GRID
// ══════════════════════════════════════════
function buildGrid() {
  TEMPLES.forEach(t => {
    const c = document.createElement('div');
    c.className = 'card';
    c.id = 'card-' + t.id;
    c.innerHTML = `
      <img class="card-img" src="${t.img}" alt="${t.name}"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy">
      <div class="card-fallback">${t.emoji}</div>
      <div class="card-info">
        <div class="card-name">${t.name}</div>
        <span class="badge loading" id="b-${t.id}">
          <span class="bdot"></span>&nbsp;તપાસ...
        </span>
      </div>`;
    c.addEventListener('click', () => open(t));
    gridEl.appendChild(c);
  });
}

// ══════════════════════════════════════════
// YOUTUBE LIVE CHECK
// ══════════════════════════════════════════
async function checkAll() {
  setStatus('checking', 'સ્થિતિ તપાસવામાં...');
  await Promise.allSettled(TEMPLES.map(checkOne));
  const anyLive = TEMPLES.some(t => STATUS[t.channelId]?.live);
  setStatus('done', anyLive ? 'કેટલાક મંદિર હાલ લાઈવ છે ✦' : 'હાલ કોઈ લાઈવ નથી');
}

async function checkOne(t) {
  try {
    const url = `https://www.googleapis.com/youtube/v3/search?part=id&channelId=${t.channelId}&eventType=live&type=video&maxResults=1&key=${API_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    if (d.error) throw new Error(d.error.message);
    const items = d.items || [];
    if (items.length) {
      STATUS[t.channelId] = { live: true, videoId: items[0].id.videoId };
      badge(t.id, 'live', '● લાઈવ');
    } else {
      STATUS[t.channelId] = { live: false, videoId: null };
      badge(t.id, 'offline', 'ઑફલાઇન');
    }
  } catch(e) {
    STATUS[t.channelId] = { live: false, videoId: null };
    badge(t.id, 'offline', 'ઑફલાઇન');
  }
}

function badge(id, cls, label) {
  const el = document.getElementById('b-' + id);
  if (!el) return;
  el.className = 'badge ' + cls;
  el.innerHTML = `<span class="bdot"></span>&nbsp;${label}`;
}

function setStatus(state, txt) {
  sdot.className = 'sdot ' + state;
  stext.textContent = txt;
}

// ══════════════════════════════════════════
// OPEN TEMPLE
// ══════════════════════════════════════════
function open(t) {
  const s = STATUS[t.channelId];
  let src;
  if (s?.live && s.videoId) {
    src = `https://www.youtube-nocookie.com/embed/${s.videoId}?autoplay=1&rel=0&modestbranding=1&playsinline=1`;
  } else {
    // try videos tab (VOD list), fall back to channel page
    src = `https://www.youtube.com/channel/${t.channelId}/videos`;
  }
  frameEl.src = src;
  homeEl.classList.add('hidden');
  playerEl.classList.remove('hidden');
  triggerBack(); // show back btn immediately
}

// ══════════════════════════════════════════
// BACK BUTTON LOGIC
// ══════════════════════════════════════════
function triggerBack() {
  clearTimeout(backTimer);
  backEl.classList.add('show');
  catchEl.style.pointerEvents = 'none'; // taps reach iframe
  backTimer = setTimeout(hideBack, 5000);
}

function hideBack() {
  backEl.classList.remove('show');
  catchEl.style.pointerEvents = 'auto'; // re-arm invisible overlay
}

function goHome() {
  clearTimeout(backTimer);
  hideBack();
  frameEl.src = 'about:blank';
  playerEl.classList.add('hidden');
  homeEl.classList.remove('hidden');
}

// Invisible overlay → show back
catchEl.addEventListener('click', triggerBack);
catchEl.addEventListener('touchend', e => { e.preventDefault(); triggerBack(); }, { passive: false });

// Back button itself
backEl.addEventListener('click', e => { e.stopPropagation(); goHome(); });
backEl.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); goHome(); }, { passive: false });

// ══════════════════════════════════════════
// PREVENT PULL-TO-REFRESH (iOS)
// ══════════════════════════════════════════
document.addEventListener('touchmove', e => {
  if (!e.target.closest('#home')) e.preventDefault();
}, { passive: false });

// ══════════════════════════════════════════
// AUTO-REFRESH EVERY 5 MIN
// ══════════════════════════════════════════
function scheduleRefresh() {
  setTimeout(() => { checkAll().then(scheduleRefresh); }, 5 * 60 * 1000);
}

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
buildGrid();
checkAll().then(scheduleRefresh);
</script>
</body>
</html>
