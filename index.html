<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="દર્શન" />
  <title>દર્શન</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ═══════════════════════════
     HOME SCREEN
════════════════════════════ -->
<div class="screen" id="home">
  <div class="home-inner">

    <div class="home-header">
      <div class="om">ॐ</div>
      <div class="title">દર્શન</div>
      <div class="subtitle">લાઈવ મંદિર દર્શન</div>
    </div>

    <div class="divider"></div>

    <div class="status">
      <div class="sdot" id="sdot"></div>
      <span id="stext">સ્થિતિ તપાસવામાં આવી રહી છે...</span>

      <button id="refresh" class="refresh-btn">
          ↻
      </button>
  </div>

    <div class="grid" id="grid"></div>

  </div>
</div>

<!-- ═══════════════════════════
     PLAYER SCREEN
════════════════════════════ -->
<div class="screen hidden" id="player">

  <!-- corner ornaments -->
  <div class="orn orn-tl"><svg viewBox="0 0 26 26"><path d="M2 24V2h22" stroke="#c8922a" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="2" cy="2" r="2" fill="#c8922a"/></svg></div>
  <div class="orn orn-tr"><svg viewBox="0 0 26 26"><path d="M2 24V2h22" stroke="#c8922a" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="2" cy="2" r="2" fill="#c8922a"/></svg></div>
  <div class="orn orn-bl"><svg viewBox="0 0 26 26"><path d="M2 24V2h22" stroke="#c8922a" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="2" cy="2" r="2" fill="#c8922a"/></svg></div>
  <div class="orn orn-br"><svg viewBox="0 0 26 26"><path d="M2 24V2h22" stroke="#c8922a" stroke-width="2" stroke-linecap="round" fill="none"/><circle cx="2" cy="2" r="2" fill="#c8922a"/></svg></div>

  <iframe class="p-frame" id="frame"
    allow="autoplay; encrypted-media; fullscreen; picture-in-picture"
    allowfullscreen
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>

  <!-- invisible tap catcher (re-shows back button) -->
  <div class="tap-catch" id="catch"></div>

  <!-- back chevron -->
  <button class="back" id="back" aria-label="પાછા">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

</div>

<!-- ═══════════════════════════
     OFFLINE INTERSTITIAL
════════════════════════════ -->
<div class="screen hidden" id="offline-screen">

  <div class="offline-inner">
    <div class="offline-om">ॐ</div>
    <div class="offline-temple-name" id="offline-temple-name"></div>

    <div class="offline-icon">🙏</div>

    <p class="offline-msg" id="offline-msg">હાલ લાઈવ નથી</p>
    <p class="offline-sub" id="offline-sub">છેલ્લા વિડિઓ YouTube પર જોઈ શકો છો</p>

    <button class="offline-btn" id="offline-open-btn">
      YouTube પર જુઓ
    </button>

    <button class="offline-back-btn" id="offline-back-btn">
      ← પાછા જાઓ
    </button>
  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="js/app.js"></script>
</body>
</html>
